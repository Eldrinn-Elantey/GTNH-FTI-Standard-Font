name: Release ResourcePack

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Get version from PR title
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          TITLE="$(echo "$PR_TITLE" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          VERSION="${TITLE#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Неверный формат версии: '$VERSION'"
            echo "Заголовок PR должен быть в формате: v1.2.3 или 1.2.3"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Update pack.mcmeta version
        shell: bash
        run: |
          set -euo pipefail
          sed -i -E "s/v[0-9]+\.[0-9]+\.[0-9]+/v${VERSION}/" pack.mcmeta

      - name: Create zip archive
        shell: bash
        run: |
          set -euo pipefail

          ZIP_NAME="GTNH-FTI-Standard-Font-v${VERSION}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

          zip -r "$ZIP_NAME" assets pack.mcmeta pack.png

      - name: Extract changelog
        shell: bash
        run: |
          set -euo pipefail
          awk "/## Version: ${VERSION//./\\.}/{flag=1;next}/## Version: /{flag=0}flag" CHANGELOG.md > RELEASE.md
          if [[ ! -s RELEASE.md ]]; then
            echo "Release v${VERSION}" > RELEASE.md
          fi
          cat RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "v${{ env.VERSION }}"
          body_path: RELEASE.md
          target_commitish: "${{ github.event.pull_request.merge_commit_sha }}"
          files: ${{ env.ZIP_NAME }}